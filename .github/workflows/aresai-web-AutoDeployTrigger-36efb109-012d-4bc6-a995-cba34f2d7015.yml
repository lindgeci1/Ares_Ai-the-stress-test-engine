name: Trigger auto deployment for aresai-web

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/aresai-web-AutoDeployTrigger-36efb109-012d-4bc6-a995-cba34f2d7015.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARESAIWEB_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.ARESAIWEB_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.ARESAIWEB_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}/frontend
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: docker.io
          registryUsername: ${{ secrets.ARESAIWEB_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.ARESAIWEB_REGISTRY_PASSWORD }}
          containerAppName: aresai-web
          resourceGroup: AresAI
          imageToBuild: lindgeci/aresai-web:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


