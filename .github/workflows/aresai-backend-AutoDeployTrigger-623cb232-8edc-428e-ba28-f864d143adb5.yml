name: Trigger auto deployment for aresai-backend

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/aresai-backend-AutoDeployTrigger-623cb232-8edc-428e-ba28-f864d143adb5.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARESAIBACKEND_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.ARESAIBACKEND_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.ARESAIBACKEND_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}/backend
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: docker.io
          registryUsername: ${{ secrets.ARESAIBACKEND_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.ARESAIBACKEND_REGISTRY_PASSWORD }}
          containerAppName: aresai-backend
          resourceGroup: Ares_Ai-the-stress-test-engine
          imageToBuild: lindgeci/aresai-backend:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


