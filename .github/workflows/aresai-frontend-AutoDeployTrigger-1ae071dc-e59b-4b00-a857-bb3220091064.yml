name: Trigger auto deployment for aresai-frontend

on:
  push:
    branches: 
      [ main ]
    paths:
      - '**'
      - '.github/workflows/aresai-frontend-AutoDeployTrigger-1ae071dc-e59b-4b00-a857-bb3220091064.yml'

  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write
      contents: read

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ARESAIFRONTEND_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.ARESAIFRONTEND_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.ARESAIFRONTEND_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}/frontend
          dockerfilePath: ./Dockerfile
          registryUrl: docker.io
          registryUsername: ${{ secrets.ARESAIFRONTEND_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.ARESAIFRONTEND_REGISTRY_PASSWORD }}
          containerAppName: aresai-frontend
          resourceGroup: Ares_Ai-the-stress-test-engine
          imageToBuild: lindgeci/aresai-frontend:${{ github.sha }}
          buildArguments: |
            VITE_API_URL=https://aresai-backend.bravemoss-81b9af52.germanywestcentral.azurecontainerapps.io
            VITE_STRIPE_PUBLIC_KEY=${{ secrets.VITE_STRIPE_PUBLIC_KEY }}


